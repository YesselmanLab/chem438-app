<html lang="en">
<head>

<title>CHEM 438 · Homework</title>
<!-- Pyodide: runs real Python in the browser. This is why the app must be
     self-hosted (GitHub Pages), not a sandboxed preview. -->
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<!-- CodeMirror: Python syntax highlighting in the code boxes (degrades to a
     plain textarea if the CDN is blocked). -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<style>
  :root{
    --bg:#f4f5fa;--card:#fff;--ink:#1b1d2b;--soft:#565a72;--faint:#8a8ea6;
    --line:#e4e5f0;--line2:#d3d5e6;--accent:#5457d6;--accent-ink:#3f42b8;--accent-soft:#ececfb;
    --good:#12805c;--good-soft:#e2f3ec;--bad:#c53b52;--bad-soft:#fbe6ea;
    --code-bg:#1c1f2e;--code-ink:#e6e8f4;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",Arial,sans-serif;
    --mono:"SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace;
    --shadow:0 1px 2px rgba(20,22,40,.04),0 10px 30px rgba(20,22,40,.07);
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#14151e;--card:#1c1e2a;--ink:#e9eaf4;--soft:#a9adc6;--faint:#767a95;
    --line:#2a2d3d;--line2:#3a3e52;--accent:#888cf5;--accent-ink:#a7abff;--accent-soft:#23253a;
    --good:#4ecb96;--good-soft:#172a24;--bad:#f0849a;--bad-soft:#2c1a20;--code-bg:#10121c;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 12px 34px rgba(0,0,0,.4);}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:720px;margin:0 auto;padding:22px 16px 80px}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:14px}
  .top b{font-weight:650}.top small{display:block;color:var(--faint);font-size:12px}
  .banner{font-size:13px;padding:10px 14px;border-radius:10px;margin-bottom:16px;display:none}
  .banner.show{display:block}
  .banner.warn{background:var(--bad-soft);color:var(--bad)}
  .banner.info{background:var(--accent-soft);color:var(--accent-ink)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:24px;margin-bottom:16px}
  h1{font-size:1.4rem;margin:0 0 6px;letter-spacing:-.02em}
  .intro{color:var(--soft);margin:0 0 4px}
  label.fld{display:block;font-size:13px;font-weight:600;color:var(--soft);margin:0 0 8px}
  select,input,textarea{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:var(--bg);border:1.5px solid var(--line2);border-radius:10px;padding:11px 13px;outline:none}
  select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea.code{font-family:var(--mono);font-size:13.5px;line-height:1.5;min-height:96px;white-space:pre;overflow-wrap:normal;tab-size:4}
  textarea.prose{min-height:96px;line-height:1.5}
  .btn{font-family:var(--sans);font-size:15px;font-weight:600;border-radius:10px;padding:11px 18px;border:1.5px solid transparent;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-ink)}
  .btn-primary:disabled{background:var(--line2);color:var(--faint);cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--soft);border:1.5px solid var(--line2)}
  .btn-ghost:hover{color:var(--ink);border-color:var(--faint)}
  .btn-sm{font-size:13px;padding:8px 14px}
  .qtag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent-soft);padding:3px 8px;border-radius:6px;margin-bottom:10px}
  .qnum{color:var(--faint);font-weight:600;margin-right:6px}
  .prompt{white-space:pre-wrap;margin:0 0 14px}
  .prompt code,.prompt-inline{font-family:var(--mono);font-size:.9em;background:var(--bg);padding:1px 5px;border-radius:4px}
  pre.out{background:var(--code-bg);color:var(--code-ink);font-family:var(--mono);font-size:13px;line-height:1.55;padding:12px 14px;border-radius:10px;margin:12px 0 0;overflow-x:auto;white-space:pre-wrap;display:none}
  pre.out.show{display:block}
  .runrow{display:flex;gap:10px;align-items:center;margin-top:12px}
  .choices{display:flex;flex-direction:column;gap:9px}
  .choice{display:flex;gap:11px;align-items:flex-start;text-align:left;width:100%;background:var(--card);border:1.5px solid var(--line2);border-radius:11px;padding:12px 14px;cursor:pointer;font-size:15px;color:var(--ink);font-family:var(--sans)}
  .choice:hover{border-color:var(--accent);background:var(--accent-soft)}
  .choice.sel{border-color:var(--accent);background:var(--accent-soft)}
  .choice .mk{flex:none;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line2);display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--faint)}
  .choice.sel .mk{border-color:var(--accent);background:var(--accent);color:#fff}
  .res{display:none;margin-top:10px;font-size:14px;font-weight:600}
  .res.show{display:block}.res.ok{color:var(--good)}.res.no{color:var(--bad)}.res.pend{color:var(--faint)}
  .summary{display:flex;flex-direction:column;gap:8px;margin:16px 0}
  .srow{display:flex;align-items:center;gap:10px;font-size:14px;padding:8px 0;border-top:1px solid var(--line)}
  .srow:first-child{border-top:none}
  .dot{width:20px;height:20px;border-radius:6px;flex:none;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:700}
  .dot.ok{background:var(--good)}.dot.no{background:var(--bad)}.dot.txt{background:var(--accent)}
  .hidden{display:none!important}
  .foot{color:var(--faint);font-size:12.5px;text-align:center;margin-top:20px}
  .lessonlist{display:flex;flex-direction:column;gap:10px;margin-top:14px}
  .lessonlink{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:var(--card);border:1.5px solid var(--line2);border-radius:12px;padding:16px 18px;cursor:pointer;font-size:16px;font-weight:600;color:var(--ink);font-family:var(--sans)}
  .lessonlink:hover{border-color:var(--accent);background:var(--accent-soft)}
  .lessonlink .go{margin-left:auto;color:var(--faint);font-weight:500;font-size:13px;white-space:nowrap}
  /* CodeMirror sizing to match the plain box */
  .CodeMirror{border:1.5px solid var(--line2);border-radius:10px;height:auto;min-height:96px;font-family:var(--mono);font-size:13.5px;line-height:1.5;padding:4px 2px}
  .CodeMirror-focused{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .cm-s-default.CodeMirror{background:var(--bg);color:var(--ink)}
  .cm-s-default .CodeMirror-gutters{background:var(--bg);border:none}
  @media (max-width:480px){.card{padding:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">438</div>
    <div><b>CHEM 438 Homework</b><small id="lessonTitle">loading…</small></div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button id="homeBtn" class="btn btn-ghost btn-sm hidden">← Lessons</button>
      <button id="switchBtn" class="btn btn-ghost btn-sm hidden">Switch</button>
    </div>
  </div>

  <div class="banner info" id="pyBanner">Loading Python… the first time takes a few seconds.</div>
  <div class="banner warn" id="errBanner"></div>

  <!-- START -->
  <div class="card" id="startCard">
    <h1 id="startTitle">Lesson</h1>
    <p class="intro" id="startIntro"></p>
    <div style="height:16px"></div>
    <label class="fld" for="nameInput">Your full name</label>
    <input type="text" id="nameInput" placeholder="e.g. Danushi Pathirage" autocomplete="name">
    <p class="foot" style="text-align:left;margin:6px 0 0">Use the same name each time so your work is saved to you.</p>
    <div style="height:16px"></div>
    <button class="btn btn-primary" id="startBtn" style="width:100%" disabled>Start →</button>
  </div>

  <!-- HOME (lesson picker) -->
  <div class="card hidden" id="homeCard">
    <h1>Your assignments</h1>
    <p class="intro" id="homeHi"></p>
    <div id="lessonList" class="lessonlist"></div>
  </div>

  <!-- QUESTIONS -->
  <div id="qCards" class="hidden"></div>
  <div class="card hidden" id="submitCard">
    <button class="btn btn-primary" id="submitBtn" style="width:100%">Submit lesson for grading</button>
    <p class="foot" id="submitNote"></p>
  </div>

  <!-- RESULTS -->
  <div class="card hidden" id="resultsCard">
    <span class="qtag">Submitted</span>
    <h1 id="resTitle">Results</h1>
    <div class="summary" id="resSummary"></div>
    <p class="foot" id="resFoot"></p>
  </div>

  <div class="foot">Your work runs in your own browser. Answers are graded privately.</div>
</div>

<script>
"use strict";
// ============================ CONFIG ============================
// After you deploy the Apps Script (see README), paste its Web-App URL here.
// Leave "" to run in PREVIEW mode: code runs, but submissions aren't graded yet.
const GRADER_URL = "";
// ================================================================

const $ = s => document.querySelector(s);
const params = new URLSearchParams(location.search);
const LESSON_ID = params.get("lesson") || "lesson_01";

let lesson = null, manifest = [], pyodide = null, pyFailed = false;
let student = null;                 // {id, name}
const state = {};                   // qid -> {choice} or {code} or {text}
let saved = {}, PROGRESS_KEY = null;   // per (student, lesson) autosave
function save(){
  if(!PROGRESS_KEY) return;
  // save ONLY the answer fields — never editor objects (which aren't JSON-serializable)
  const clean = {};
  for(const k in state){
    const s = state[k]; clean[k] = {};
    if(s.code != null)   clean[k].code = s.code;
    if(s.choice != null) clean[k].choice = s.choice;
    if(s.text != null)   clean[k].text = s.text;
  }
  try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(clean)); }catch(e){}
}

// ---------- Python harness injected into Pyodide (mirrors authoring/norm.py) ----------
const PYHARNESS = `
def _normalize(v):
    if isinstance(v, bool): return v
    if v is None or isinstance(v, (int, str)): return v
    if isinstance(v, float): return 0.0 if v == 0 else float(v)
    if isinstance(v, (list, tuple)): return [_normalize(x) for x in v]
    raise TypeError("unsupported output type: " + type(v).__name__)

def run_var(code, entry):
    ns = {}
    exec(code, ns)
    if entry not in ns: raise NameError("you didn't define '" + entry + "'")
    return _normalize(ns[entry])

def run_fn(code, entry, inputs):
    ns = {}
    exec(code, ns)
    if entry not in ns: raise NameError("you didn't define a function '" + entry + "'")
    fn = ns[entry]
    return [_normalize(fn(*list(a))) for a in inputs]

import io, contextlib
def preview(code, kind, entry, inputs):
    ns = {}; buf = io.StringIO()
    try:
        with contextlib.redirect_stdout(buf):
            exec(code, ns)
    except Exception as e:
        return {"out": buf.getvalue(), "err": type(e).__name__ + ": " + str(e)}
    out = buf.getvalue()
    if kind == "code_var":
        if entry not in ns:
            return {"out": out, "msg": "You haven't defined \`" + entry + "\` yet."}
        return {"out": out, "msg": entry + " = " + repr(ns[entry])}
    # code_fn: call the function on the example inputs so the student sees results
    if entry not in ns or not callable(ns[entry]):
        return {"out": out, "msg": "Define a function called \`" + entry + "\`."}
    lines = []
    for a in list(inputs)[:4]:
        args = ", ".join(repr(x) for x in a)
        try: lines.append(entry + "(" + args + ") → " + repr(ns[entry](*list(a))))
        except Exception as e: lines.append(entry + "(" + args + ") → ERROR: " + str(e))
    return {"out": out, "msg": "\\n".join(lines)}
`;

// ---------------- boot ----------------
async function boot(){
  try{
    manifest = ((await fetch(`lessons/index.json`).then(r=>r.json())).lessons) || [];
  }catch(e){ return showErr("Couldn't load the assignment list. Check your connection."); }

  $("#startTitle").textContent = "CHEM 438 Homework";
  $("#startIntro").textContent = "Enter your name to see your assignments.";
  const nameInput = $("#nameInput");
  nameInput.addEventListener("input", ()=>{ $("#startBtn").disabled = nameInput.value.trim().length < 2; });
  nameInput.addEventListener("keydown", e=>{ if(e.key==="Enter" && !$("#startBtn").disabled) start(); });
  $("#startBtn").onclick = start;
  $("#switchBtn").onclick = ()=>{ localStorage.removeItem("c438:name"); location.reload(); };
  $("#homeBtn").onclick = ()=>{ history.replaceState(null,"",location.pathname); showHome(); };
  // remember the last student on this device and auto-resume on refresh
  const last = localStorage.getItem("c438:name");
  if(last){ nameInput.value = last; $("#startBtn").disabled = false; start(); }

  loadPy();                 // warm Pyodide in the background
  flushQueue();             // resend any previously-queued submissions
}

function showErr(msg){ const b=$("#errBanner"); b.textContent=msg; b.classList.add("show"); }

// ---------------- Pyodide ----------------
async function loadPy(){
  if(pyodide || pyFailed) return;
  try{
    pyodide = await loadPyodide();
    pyodide.runPython(PYHARNESS);
    $("#pyBanner").classList.remove("show");
  }catch(e){
    pyFailed = true;
    $("#pyBanner").classList.remove("show");
    showErr("Python couldn't load on this device. You can still answer the multiple-choice and written questions and submit — your code will be saved for manual grading.");
  }
}

// ---------------- start / render ----------------
function start(){
  const nm = $("#nameInput").value.trim();
  if(nm.length < 2) return;
  // normalize the name into a stable id (case + extra spaces won't split a student)
  const normId = "name:" + nm.toLowerCase().replace(/\s+/g, " ").trim();
  student = {id: normId, name: nm};
  localStorage.setItem("c438:name", nm);                 // remember for auto-resume
  const sb = $("#switchBtn"); sb.textContent = "Not " + nm.split(" ")[0] + "?"; sb.classList.remove("hidden");
  gotoAfterName();
}

function gotoAfterName(){
  const dl = params.get("lesson");
  if(dl && manifest.some(l=>l.id===dl)) openLesson(dl);
  else showHome();
}

function showHome(){
  ["#startCard","#qCards","#submitCard","#resultsCard"].forEach(s=>$(s).classList.add("hidden"));
  $("#homeCard").classList.remove("hidden");
  $("#homeBtn").classList.add("hidden");
  $("#lessonTitle").textContent = "Assignments";
  $("#homeHi").textContent = "Hi " + student.name.split(" ")[0] + " — pick an assignment.";
  const list = $("#lessonList"); list.innerHTML = "";
  manifest.forEach(l=>{
    const inProg = !!localStorage.getItem("c438:" + student.id + ":" + l.id);
    const b = document.createElement("button"); b.className = "lessonlink";
    b.innerHTML = "<span>" + esc(l.title) + "</span><span class='go'>" + (inProg ? "resume " : "start ") + "→</span>";
    b.onclick = ()=>openLesson(l.id);
    list.appendChild(b);
  });
}

async function openLesson(id){
  $("#homeCard").classList.add("hidden");
  $("#errBanner").classList.remove("show");
  try{ lesson = await fetch(`lessons/${id}.json`).then(r=>r.json()); }
  catch(e){ return showErr("Couldn't load " + id + "."); }
  $("#lessonTitle").textContent = lesson.title;
  history.replaceState(null, "", "?lesson=" + id);
  PROGRESS_KEY = "c438:" + student.id + ":" + lesson.id;
  saved = JSON.parse(localStorage.getItem(PROGRESS_KEY) || "{}");
  $("#resultsCard").classList.add("hidden");
  $("#qCards").classList.remove("hidden");     // show BEFORE building so CodeMirror measures real width
  $("#submitCard").classList.remove("hidden");
  $("#homeBtn").classList.remove("hidden");
  const btn = $("#submitBtn"); btn.disabled = false; btn.textContent = "Submit lesson for grading";
  $("#submitNote").textContent = GRADER_URL ? "" : "Preview mode: grading backend not connected yet.";
  renderQuestions();
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function promptHtml(t){ return esc(t).replace(/`([^`]+)`/g,'<span class="prompt-inline">$1</span>'); }

function renderQuestions(){
  const wrap = $("#qCards"); wrap.innerHTML="";
  const cmInits = [];
  lesson.questions.forEach((q,i)=>{
    state[q.id] = saved[q.id] ? Object.assign({}, saved[q.id]) : {};
    const card = document.createElement("div"); card.className="card";
    const tag = {code_var:"Write code",code_fn:"Write code",mcq:"Multiple choice",written:"Short answer"}[q.kind];
    card.innerHTML = `<span class="qtag">${tag}</span><div class="prompt"><span class="qnum">Q${i+1}.</span>${promptHtml(q.prompt)}</div>`;

    if(q.kind==="code_var" || q.kind==="code_fn"){
      const ta=document.createElement("textarea"); ta.className="code"; ta.spellcheck=false;
      ta.value = (state[q.id].code != null ? state[q.id].code : (q.starter||""));
      state[q.id].code=ta.value;
      ta.addEventListener("keydown",tabKey);
      ta.addEventListener("input",()=>{ state[q.id].code=ta.value; save(); });
      const out=document.createElement("pre"); out.className="out";
      const run=document.createElement("button"); run.className="btn btn-ghost btn-sm"; run.textContent="▶ Run";
      run.onclick=()=>runCode(q, state[q.id].code, out);
      const row=document.createElement("div"); row.className="runrow"; row.appendChild(run);
      card.appendChild(ta); card.appendChild(row); card.appendChild(out);
      cmInits.push(()=>upgradeCM(q, ta));   // syntax highlighting after cards are in the DOM
    } else if(q.kind==="mcq"){
      const box=document.createElement("div"); box.className="choices";
      const L=["A","B","C","D","E"];
      q.choices.forEach((c,ci)=>{
        const b=document.createElement("button"); b.className="choice";
        b.innerHTML=`<span class="mk">${L[ci]}</span><span>${esc(c)}</span>`;
        if(state[q.id].choice===ci) b.classList.add("sel");
        b.onclick=()=>{ box.querySelectorAll(".choice").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); state[q.id].choice=ci; save(); };
        box.appendChild(b);
      });
      card.appendChild(box);
    } else if(q.kind==="written"){
      const ta=document.createElement("textarea"); ta.className="prose"; ta.placeholder="Type your answer…";
      ta.value = state[q.id].text || "";
      ta.addEventListener("input",()=>{ state[q.id].text=ta.value; save(); });
      card.appendChild(ta);
    }
    const res=document.createElement("div"); res.className="res"; res.id="res-"+q.id; card.appendChild(res);
    wrap.appendChild(card);
  });
  if(window.CodeMirror) cmInits.forEach(f=>f());   // upgrade textareas -> editors
}

function upgradeCM(q, ta){
  const dark = (document.documentElement.getAttribute("data-theme")
      || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")) === "dark";
  const cm = CodeMirror.fromTextArea(ta, {
    mode:"python", theme: dark ? "material-darker" : "default",
    lineNumbers:false, indentUnit:4, tabSize:4, viewportMargin:Infinity,
  });
  cm.setSize(null, "auto");
  cm.on("change", ()=>{ state[q.id].code = cm.getValue(); save(); });
  requestAnimationFrame(()=>cm.refresh());     // re-measure once laid out (fixes blank/broken render)
}

function tabKey(e){
  if(e.key==="Tab"){ e.preventDefault(); const t=e.target,s=t.selectionStart;
    t.value=t.value.slice(0,s)+"    "+t.value.slice(t.selectionEnd); t.selectionStart=t.selectionEnd=s+4; }
}

// ---------------- run (interactive, client-side only) ----------------
async function runCode(q,code,out){
  out.classList.add("show"); out.textContent="running…";
  if(pyFailed){ out.textContent="Python isn't available on this device."; return; }
  await loadPy();
  let text="";
  try{
    const inputs = pyodide.toPy(q.inputs || []);
    const rp = pyodide.globals.get("preview")(code, q.kind, q.entry, inputs);
    const r = (rp && rp.toJs) ? rp.toJs({dict_converter:Object.fromEntries}) : rp;
    if(rp && rp.destroy) rp.destroy();
    text = (r.out || "");
    if(r.err) text += (text?"\n":"") + r.err;
    else if(r.msg) text += (text?"\n":"") + r.msg;
  }catch(e){ text = trimErr(e); }
  out.textContent = text || "(no output)";
  // Correctness needs the hidden answer key, so we ask the server (only when connected).
  if(GRADER_URL){
    out.textContent = (text || "(no output)") + "\n\nchecking…";
    const verdict = await checkOne(q, await codeAnswer(q, code));
    out.textContent = (text || "(no output)") + "\n\n" + (
      verdict===true ? "✓ correct!" :
      verdict===false ? "✗ not correct yet — keep trying" :
      "(couldn't reach the grader)");
  }
}

async function codeAnswer(q, code){
  await loadPy();
  const a = {id:q.id, kind:q.kind, code:code};
  try{
    if(q.kind==="code_var"){
      const v = pyodide.globals.get("run_var")(code, q.entry);
      a.outputs = [(v && v.toJs) ? v.toJs() : v]; if(v && v.destroy) v.destroy();
    } else {
      const r = pyodide.globals.get("run_fn")(code, q.entry, pyodide.toPy(q.inputs));
      a.outputs = (r && r.toJs) ? r.toJs() : r; if(r && r.destroy) r.destroy();
    }
  }catch(e){ a.error = trimErr(e); }
  return a;
}

async function checkOne(q, a){
  try{
    const r = await fetch(GRADER_URL, {method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"check", lesson:lesson.id, answers:[a]})});
    const d = JSON.parse(await r.text());
    if(d && d.ok && d.results) return d.results[q.id];
  }catch(_){}
  return null;
}
function trimErr(e){ const m=String(e.message||e).trim().split("\n"); return m[m.length-1]; }

// ---------------- submit ----------------
async function submit(){
  $("#submitBtn").disabled=true; $("#submitBtn").textContent="Grading…";
  const answers=[];
  for(const q of lesson.questions){
    if(q.kind==="mcq"){ answers.push({id:q.id,kind:q.kind,choice:state[q.id].choice ?? null}); }
    else if(q.kind==="written"){ answers.push({id:q.id,kind:q.kind,text:state[q.id].text||""}); }
    else { // code question
      answers.push(pyFailed
        ? {id:q.id, kind:q.kind, code:state[q.id].code||"", error:"python-unavailable"}
        : await codeAnswer(q, state[q.id].code||""));
    }
  }
  const payload={lesson:lesson.id,rosterId:student.id,name:student.name,attemptId:uuid(),ts:new Date().toISOString(),answers};
  const res=await send(payload);
  showResults(payload,res);
}

function jsify(pyproxy){ try{ const v=pyproxy.toJs?pyproxy.toJs():pyproxy; if(pyproxy.destroy)pyproxy.destroy(); return v; }catch(_){ return pyproxy; } }

async function send(payload){
  if(!GRADER_URL) return {ok:false,preview:true};
  try{
    const r=await fetch(GRADER_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    const txt=await r.text();
    let data; try{ data=JSON.parse(txt); }catch(_){ throw new Error("bad response"); }
    if(!data||data.ok!==true) throw new Error("not ok");
    return data;
  }catch(e){ queue(payload); return {ok:false,queued:true}; }
}

// ---------------- offline queue ----------------
function queue(p){ const q=JSON.parse(localStorage.getItem("c438q")||"[]"); q.push(p); localStorage.setItem("c438q",JSON.stringify(q)); }
async function flushQueue(){
  if(!GRADER_URL) return;
  let q=JSON.parse(localStorage.getItem("c438q")||"[]"); if(!q.length) return;
  const keep=[];
  for(const p of q){ try{ const r=await fetch(GRADER_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)}); const d=JSON.parse(await r.text()); if(!d||d.ok!==true)keep.push(p); }catch(_){ keep.push(p); } }
  localStorage.setItem("c438q",JSON.stringify(keep));
}
window.addEventListener("online",flushQueue);

// ---------------- results ----------------
function showResults(payload,res){
  $("#qCards").classList.add("hidden"); $("#submitCard").classList.add("hidden");
  const card=$("#resultsCard"); card.classList.remove("hidden");
  const sum=$("#resSummary"); sum.innerHTML="";
  const results = res.ok ? res.results : null;
  let auto=0,got=0;
  lesson.questions.forEach((q,i)=>{
    let dot,label;
    if(q.kind==="written"){ dot='<span class="dot txt">✎</span>'; label="answer saved"; }
    else{ auto++;
      if(results && results[q.id]===true){ dot='<span class="dot ok">✓</span>'; label="correct"; got++; }
      else if(results && results[q.id]===false){ dot='<span class="dot no">✗</span>'; label="not correct"; }
      else{ dot='<span class="dot txt">•</span>'; label = res.preview?"ran (preview — not graded)":"saved — will grade when reconnected"; }
    }
    sum.innerHTML+=`<div class="srow">${dot}<span>Q${i+1} — ${label}</span></div>`;
  });
  if(res.ok){ $("#resTitle").textContent=`${got} / ${auto} correct`; $("#resFoot").textContent="Your written answers go to your instructor."; }
  else if(res.preview){ $("#resTitle").textContent="Preview complete"; $("#resFoot").textContent="Grading backend isn't connected yet — your instructor will enable it."; }
  else{ $("#resTitle").textContent="Saved on your device"; $("#resFoot").textContent="Couldn't reach the grader; your submission is queued and will send automatically when you're back online."; }
}

function uuid(){ return "a"+Math.abs(Date.now()^(performance.now()*1e6|0)).toString(36)+Math.floor(1e6*(1+((Date.now()%97)/97))).toString(36); }
$("#submitBtn") && ($("#submitBtn").onclick=submit);

boot();
</script>
